<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <title>Offline — ADHDTasks</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }
      .card {
        max-width: 22rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 800;
      }
      p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #64748b;
      }
      .accent {
        color: #6366f1;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Geen verbinding</h1>
      <p>
        ADHDTasks heeft internet nodig. Controleer je verbinding en probeer het
        <span class="accent">opnieuw</span>.
      </p>
    </div>
  </body>
</html>
